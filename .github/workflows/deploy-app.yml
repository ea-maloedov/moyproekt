name: Deploy App to Yandex Cloud

on:
  push:
    branches:
      - master
    paths:
      - 'app/**'
      - '.github/workflows/deploy-app.yml'

concurrency:
  group: deploy-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_KEY_SECRET }}
      AWS_DEFAULT_REGION: ru-central1
      S3_ENDPOINT: https://storage.yandexcloud.net
      S3_BUCKET: ${{ secrets.YC_BUCKET_APP }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Build
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Upload assets (long cache)
        run: |
          aws s3 sync app/dist/ "s3://${S3_BUCKET}/" \
            --endpoint-url "${S3_ENDPOINT}" \
            --region "${AWS_DEFAULT_REGION}" \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload index.html (no cache)
        run: |
          aws s3 cp app/dist/index.html "s3://${S3_BUCKET}/index.html" \
            --endpoint-url "${S3_ENDPOINT}" \
            --region "${AWS_DEFAULT_REGION}" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
