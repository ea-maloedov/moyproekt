name: Deploy Landing

on:
  push:
    branches:
      - master
    paths:
      - 'landing/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS CLI
        run: |
          aws configure set aws_access_key_id ${{ secrets.YC_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.YC_SECRET_ACCESS_KEY }}
          aws configure set region ru-central1

      - name: Deploy to Object Storage
        run: |
          aws s3 sync ./landing s3://${{ secrets.YC_BUCKET_NAME }} \
            --endpoint-url=https://storage.yandexcloud.net \
            --delete \
            --exclude "README.md"