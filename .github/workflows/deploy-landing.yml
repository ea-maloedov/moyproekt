name: Deploy Landing to Yandex Cloud

on:
  push:
    branches:
      - master  # или master
    paths:
      - 'landing/**' # Скрипт сработает ТОЛЬКО при изменениях в этой папке

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Sync files to S3
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --follow-symlinks --delete # Удалит в бакете то, чего уже нет в папке landing
        env:
          AWS_S3_BUCKET: ${{ secrets.YC_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_KEY }}
          AWS_S3_ENDPOINT: https://storage.yandexcloud.net # Важно: адрес Яндекса
          SOURCE_DIR: 'landing' # Папка в твоем монорепозитории
