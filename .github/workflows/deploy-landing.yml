name: Deploy Landing to Yandex Object Storage

on:
  push:
    branches: [ "master" ]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"

concurrency:
  group: deploy-landing
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.YC_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.YC_S3_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ru-central1
      S3_BUCKET: ${{ secrets.YC_S3_BUCKET }}
      S3_ENDPOINT: ${{ secrets.YC_S3_ENDPOINT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install awscli
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Verify landing folder exists
        run: |
          test -f landing/index.html

      # 1) Сначала ассеты (кроме html) — можно кешировать надолго
      - name: Upload assets (long cache)
        run: |
          aws s3 sync landing "s3://${S3_BUCKET}/" \
            --endpoint-url "${S3_ENDPOINT}" \
            --delete \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"

      # 2) Потом HTML — почти без кеша, чтобы изменения появлялись быстро
      - name: Upload html (no/short cache)
        run: |
          aws s3 sync landing "s3://${S3_BUCKET}/" \
            --endpoint-url "${S3_ENDPOINT}" \
            --exclude "*" \
            --include "*.html" \
            --cache-control "public, max-age=60"